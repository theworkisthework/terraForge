name: Cleanup PR Build Artifacts

on:
  pull_request_target:
    types: [closed]

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const prNumber = context.payload.pull_request.number
            const prefix = `pr-${prNumber}-`

            let deleted = 0
            for await (const page of github.paginate.iterator(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            )) {
              for (const artifact of page.data.artifacts) {
                if (artifact.name.startsWith(prefix)) {
                  await github.rest.actions.deleteArtifact({
                    owner,
                    repo,
                    artifact_id: artifact.id
                  })
                  deleted++
                }
              }
            }

            core.info(`Deleted ${deleted} artifact(s) for PR #${prNumber}`)
