name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit & component tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Type check
        run: npm run typecheck

  # ── E2E (Playwright + Electron) ──────────────────────────────────────────────
  # Runs on Linux only — Electron is single-window so we use Xvfb for
  # the virtual display.  Windows/macOS variants are covered by local dev runs
  # and the release workflow gates.
  test-e2e:
    name: E2E Tests (Playwright / Electron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install system deps
        # libudev-dev  → serialport native module
        # xvfb         → virtual display for Electron window
        run: sudo apt-get update && sudo apt-get install -y libudev-dev xvfb

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ hashFiles('package-lock.json') }}

      - name: Install Node dependencies
        run: npm ci
        env:
          # Tell @electron/get where to cache the downloaded binary so the
          # cache step above can restore it on subsequent runs.
          ELECTRON_CACHE: ~/.cache/electron

      - name: Install Playwright system libraries
        # Covers the Chromium/Electron shared-library requirements on Linux
        run: npx playwright install-deps

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        env:
          TF_E2E_SVG_DIR: tests/fixtures/real_world_svgs
        # --server-args: set a 1920×1080 virtual display so Electron's 1440×900
        # window fits without being constrained by the framebuffer dimensions.
        run: xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' -- npx playwright test --config=tests/e2e/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
